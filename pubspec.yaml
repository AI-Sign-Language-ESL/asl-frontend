name: tafahom_english_light
description: A new Flutter project.

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  image_picker: ^1.0.7
  web_socket_channel: ^2.4.0


  flutter_localizations:
    sdk: flutter

  intl: ^0.20.2   # ✅ REQUIRED for flutter gen-l10n

  camera: ^0.11.3
  cupertino_icons: ^1.0.2
  provider: ^6.0.0
  flutter_svg: ^2.0.0
  font_awesome_flutter: ^10.0.0
  flutter_gen: ^5.12.0

  # 🔌 Backend connection (SAFE ADDITIONS)
  dio: ^5.4.0
  flutter_secure_storage: ^9.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

flutter:
  generate: true
  uses-material-design: true

  assets:
    - assets/logo.png
    - assets/icons/envelope_lock.png
    - assets/dial.png
    - assets/TAFAHOM TYPO.png
